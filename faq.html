<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPGDEX — FAQ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="arpgdex.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <div data-include="includes/header.html" style="height:64px;"></div>
  <div id="main-container">
    <div class="page-header-card">
      <h2><a href="faq.html">FAQ</a></h2>
      <div style="margin-top:1rem;" class="filter-bar">
        <input class="form-control" type="search" id="search-input" placeholder="질문 검색…">
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:.75rem;" class="fade-in" id="faq-list"></div>
    <div class="pagination" id="pagination"></div>
  </div>
  <div data-include="includes/footer.html"></div>
  <script src="js/base.js" type="module"></script>
  <script type="module">
    import { ARPGDEX } from './js/utils.js';
    const FAQS = [
      { question: 'MYO 슬롯은 어떻게 얻나요?', answer: 'MYO 슬롯은 MYO 판매, 이벤트 참여, 또는 경품 행사를 통해 얻을 수 있습니다. 공지 채널을 확인해 주세요!', tags: ['MYO', '슬롯'] },
      { question: '디자인을 다른 사람에게 넘기고 싶어요.', answer: '양도 신청 포럼 게시글의 양식을 작성하여 댓글로 제출해 주세요. 관리자가 최대한 빠르게 처리해 드립니다.', tags: ['양도', '소유권'] },
      { question: '특성은 어떻게 추가하나요?', answer: 'Trait Potion 등의 아이템을 사용하거나 승인된 이벤트를 통해 특성을 추가할 수 있습니다.', tags: ['특성', '아이템'] },
      { question: '커뮤니티 규칙을 어디서 볼 수 있나요?', answer: 'Terms of Service 페이지 또는 Discord 서버의 규칙 채널에서 확인할 수 있습니다.', tags: ['규칙', 'TOS'] },
    ];

    const PER_PAGE = 10;
    let state = { filtered: FAQS, search: '', page: 1 };

    function filter() {
      let arr = FAQS;
      if (state.search) { const q = state.search.toLowerCase(); arr = arr.filter(f => (f.question+f.answer+f.tags.join('')).toLowerCase().includes(q)); }
      state.filtered = arr; state.page = 1;
    }

    function render() {
      const list = document.getElementById('faq-list');
      const { items } = ARPGDEX.paginate(state.filtered, state.page, PER_PAGE);
      if (!items.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-circle-question"></i><p>질문이 없습니다.</p></div>'; return; }
      list.innerHTML = items.map(f => `
        <div class="card">
          <div class="card-header" style="font-size:.95rem;cursor:pointer;" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
            <i class="fas fa-chevron-right" style="margin-right:.5rem;font-size:.7rem;color:var(--primary);"></i>${f.question}
          </div>
          <div class="card-body" style="font-size:.875rem;color:var(--text-secondary);">${f.answer}</div>
          <div class="card-footer" style="display:flex;gap:.4rem;flex-wrap:wrap;">
            ${f.tags.map(t => `<span class="tag-pill">#${t}</span>`).join('')}
          </div>
        </div>`).join('');
      ARPGDEX.renderPagination(document.getElementById('pagination'), state.page, Math.ceil(state.filtered.length/PER_PAGE), p => { state.page=p; render(); });
    }

    document.getElementById('search-input').addEventListener('input', ARPGDEX.debounce(e => { state.search = e.target.value; filter(); render(); }));
    document.addEventListener('DOMContentLoaded', () => { filter(); render(); });
  </script>
</body>
</html>
