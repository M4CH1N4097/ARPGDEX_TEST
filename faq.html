<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPGDEX — FAQ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="arpgdex.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <div data-include="includes/header.html" style="height:64px;"></div>
  <div id="main-container">
    <div class="page-header-card">
      <h2><a href="faq.html" id="page-title">FAQ</a></h2>
      <div style="margin-top:1rem;" class="filter-bar">
        <input class="form-control" type="search" id="search-input" placeholder="질문 검색…">
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:.75rem;" class="fade-in" id="faq-list">
      <div style="text-align:center;padding:3rem;color:var(--text-muted);">
        <i class="fas fa-spinner fa-spin" style="font-size:1.5rem;margin-bottom:.75rem;display:block;"></i>
        데이터를 불러오는 중입니다…
      </div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
  <div data-include="includes/footer.html"></div>
  <script src="js/base.js" type="module"></script>
  <script type="module">
    import { ARPGDEX } from './js/utils.js';

    const PER_PAGE = 10;
    let FAQ_DATA = [];
    let state = { filtered: [], search: '', page: 1 };

    /* ---- 데이터 로드 ---- */
    async function loadData() {
      await ARPGDEX.loadStrings();

      // 페이지 제목 — String 시트에서 가져옴 (String ID 50번, 필요 시 변경)
      const titleEl = document.getElementById('page-title');
      if (titleEl && ARPGDEX.S(50)) titleEl.innerHTML = ARPGDEX.S(50);

      // 검색 플레이스홀더 — String ID 37번
      const searchEl = document.getElementById('search-input');
      if (searchEl && ARPGDEX.S(37)) searchEl.placeholder = ARPGDEX.S(37);

      const rows = await ARPGDEX.importSheet('FAQ');

      // importSheet가 hide=TRUE 행을 이미 걸러주므로 추가 필터 불필요
      FAQ_DATA = rows
        .filter(r => r['id'] && String(r['id']) !== '0')
        .map(r => ({
          id:       String(r['id']       || ''),
          question: String(r['question'] || '').trim(),
          answer:   String(r['answer']   || '').trim(),
          // Tags[] 컬럼: 쉼표로 구분, 빈 항목 제거
          tags: String(r['tags[]'] || '')
            .split(',')
            .map(t => t.trim())
            .filter(Boolean),
        }))
        .filter(r => r.question); // 질문 없는 행 제외

      filterData();
      render();
    }

    /* ---- 필터 ---- */
    function filterData() {
      let arr = FAQ_DATA;
      if (state.search) {
        const q = state.search.toLowerCase();
        arr = arr.filter(f =>
          (f.question + f.answer + f.tags.join('')).toLowerCase().includes(q)
        );
      }
      state.filtered = arr;
      state.page = 1;
    }

    /* ---- 렌더 ---- */
    function render() {
      const list = document.getElementById('faq-list');
      const { items } = ARPGDEX.paginate(state.filtered, state.page, PER_PAGE);

      if (!items.length) {
        list.innerHTML = '<div class="empty-state"><i class="fas fa-circle-question"></i><p>질문이 없습니다.</p></div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      list.innerHTML = items.map(f => `
        <div class="card">
          <div class="card-header" style="font-size:.95rem;cursor:pointer;"
            onclick="const body=this.nextElementSibling;const icon=this.querySelector('.faq-chevron');body.style.display=body.style.display==='none'?'':'none';icon.style.transform=body.style.display===''?'rotate(90deg)':'';">
            <i class="fas fa-chevron-right faq-chevron" style="margin-right:.5rem;font-size:.7rem;color:var(--primary);transition:transform .2s;"></i>${f.question}
          </div>
          <div class="card-body" style="font-size:.875rem;color:var(--text-secondary);">${f.answer}</div>
          ${f.tags.length ? `
          <div class="card-footer" style="display:flex;gap:.4rem;flex-wrap:wrap;">
            ${f.tags.map(t => `<span class="tag-pill">#${t}</span>`).join('')}
          </div>` : ''}
        </div>`).join('');

      ARPGDEX.renderPagination(
        document.getElementById('pagination'),
        state.page,
        Math.ceil(state.filtered.length / PER_PAGE),
        p => { state.page = p; render(); window.scrollTo(0, 0); }
      );
    }

    /* ---- 이벤트 ---- */
    document.getElementById('search-input').addEventListener('input',
      ARPGDEX.debounce(e => { state.search = e.target.value; filterData(); render(); })
    );

    document.addEventListener('DOMContentLoaded', () => {
      loadData().catch(err => {
        console.error('[ARPGDEX] FAQ 로드 실패:', err);
        document.getElementById('faq-list').innerHTML =
          '<div class="empty-state"><i class="fas fa-triangle-exclamation"></i><p>데이터를 불러오지 못했습니다.</p></div>';
      });
    });
  </script>
</body>
</html>
