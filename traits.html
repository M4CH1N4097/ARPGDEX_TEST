<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPGDEX — Trait Catalogue</title>
  <meta name="robots" content="noai, noimageai">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="arpgdex.css">
</head>
<body>
  <div data-include="includes/header.html"></div>

  <div id="main-container">

    <div id="list-view">
      <div class="page-header-card">
        <h2><a href="traits.html">Trait Catalogue</a></h2>
        <div style="margin-top:1rem;" class="cat-tabs" id="type-tabs">
          <button class="cat-tab active" data-cat="all">All</button>
          <button class="cat-tab" data-cat="Ears">Ears</button>
          <button class="cat-tab" data-cat="Eyes">Eyes</button>
          <button class="cat-tab" data-cat="Body">Body</button>
          <button class="cat-tab" data-cat="Limbs">Limbs</button>
          <button class="cat-tab" data-cat="Tails">Tails</button>
          <button class="cat-tab" data-cat="Misc">Misc</button>
          <button class="cat-tab" data-cat="Mutations">Mutations</button>
        </div>
        <div style="margin-top:.85rem;" class="filter-bar">
          <select class="form-control" id="filter-rarity" style="max-width:160px;">
            <option value="all">Rarity: All</option>
            <option value="Common">Common</option>
            <option value="Uncommon">Uncommon</option>
            <option value="Rare">Rare</option>
            <option value="Very Rare">Very Rare</option>
            <option value="Legendary">Legendary</option>
          </select>
          <input class="form-control" type="search" id="search-input" placeholder="특성명 검색…">
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;" class="fade-in" id="traits-grid"></div>
      <div id="empty-state" class="empty-state hidden"><i class="fas fa-sparkles"></i><p>특성이 없습니다.</p></div>
      <div class="pagination" id="pagination"></div>
    </div>

    <div id="profile-view" class="hidden">
      <div style="margin-bottom:1rem;">
        <button class="btn btn-ghost btn-sm" id="back-btn"><i class="fas fa-arrow-left"></i> 목록으로</button>
      </div>
      <div class="card fade-in">
        <div class="card-header" style="padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;">
          <h2 id="profile-name" style="font-size:1.3rem;"></h2>
          <span id="profile-rarity"></span>
        </div>
        <div style="padding:1.5rem 2rem;">
          <div style="display:grid;grid-template-columns:180px 1fr;gap:2rem;align-items:start;" id="trait-detail-grid">
            <img id="trait-img" src="" alt="" style="width:100%;border-radius:var(--radius);background:var(--bg-faded);">
            <div>
              <table class="info-table">
                <tr><td>Trait</td><td id="d-trait"></td></tr>
                <tr><td>Type</td><td id="d-type"></td></tr>
                <tr><td>Rarity</td><td id="d-rarity"></td></tr>
                <tr><td>Price</td><td id="d-price"></td></tr>
              </table>
              <hr>
              <div style="font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.5rem;">Description</div>
              <div id="d-desc" class="text-pre" style="font-size:.875rem;color:var(--text-secondary);"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div data-include="includes/footer.html"></div>
  <script src="js/base.js"></script>
  <script type="module">
    import { ARPGDEX } from './js/utils.js';

    const TRAITS = [
      { trait: 'Floppy Ears', type: 'Ears', rarity: 'Common', price: '0', description: '귀가 아래로 늘어진 형태입니다.', image: 'https://picsum.photos/seed/t1/200/200' },
      { trait: 'Pointed Ears', type: 'Ears', rarity: 'Common', price: '0', description: '뾰족하게 솟아있는 귀입니다.', image: 'https://picsum.photos/seed/t2/200/200' },
      { trait: 'Big Eyes', type: 'Eyes', rarity: 'Uncommon', price: '5', description: '평균보다 크고 반짝이는 눈입니다.', image: 'https://picsum.photos/seed/t3/200/200' },
      { trait: 'Magic Eyes', type: 'Eyes', rarity: 'Rare', price: '15', description: '마법의 기운이 담긴 눈입니다.', image: 'https://picsum.photos/seed/t4/200/200' },
      { trait: 'Spot Tail', type: 'Tails', rarity: 'Common', price: '0', description: '점박이 무늬가 있는 꼬리입니다.', image: 'https://picsum.photos/seed/t5/200/200' },
      { trait: 'Glowing Tail', type: 'Tails', rarity: 'Very Rare', price: '40', description: '빛을 발하는 신비로운 꼬리입니다.', image: 'https://picsum.photos/seed/t6/200/200' },
      { trait: 'Dragon Wings', type: 'Body', rarity: 'Legendary', price: '100', description: '용의 날개를 달고 있습니다.', image: 'https://picsum.photos/seed/t7/200/200' },
      { trait: 'Horn', type: 'Mutations', rarity: 'Rare', price: '20', description: '머리에 뿔이 자라 있습니다.', image: 'https://picsum.photos/seed/t8/200/200' },
    ];

    const PER_PAGE = 12;
    let state = { filtered: TRAITS, cat: 'all', rarity: 'all', search: '', page: 1 };

    function filter() {
      let arr = TRAITS;
      if (state.cat !== 'all') arr = arr.filter(t => t.type === state.cat);
      if (state.rarity !== 'all') arr = arr.filter(t => t.rarity === state.rarity);
      if (state.search) { const q = state.search.toLowerCase(); arr = arr.filter(t => t.trait.toLowerCase().includes(q)); }
      state.filtered = arr; state.page = 1;
    }

    function render() {
      const grid = document.getElementById('traits-grid');
      const empty = document.getElementById('empty-state');
      const { items } = ARPGDEX.paginate(state.filtered, state.page, PER_PAGE);
      if (!items.length) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      grid.innerHTML = items.map(t => `
        <div class="card" style="cursor:pointer;transition:border-color .2s,transform .2s;overflow:hidden;" onclick="showProfile('${t.trait}')"
          onmouseover="this.style.borderColor='var(--border-strong)';this.style.transform='translateY(-2px)'"
          onmouseout="this.style.borderColor='';this.style.transform=''">
          <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-family:var(--font-heading);font-size:.85rem;">${t.trait}</span>
            ${ARPGDEX.rarityBadge(t.rarity)}
          </div>
          <div style="padding:1rem;display:flex;align-items:center;gap:1rem;">
            <img src="${t.image}" alt="${t.trait}" style="width:80px;height:80px;object-fit:cover;border-radius:var(--radius);flex-shrink:0;">
            <div style="font-size:.82rem;color:var(--text-secondary);line-height:1.5;">${t.description}</div>
          </div>
        </div>`).join('');
      ARPGDEX.renderPagination(document.getElementById('pagination'), state.page, Math.ceil(state.filtered.length/PER_PAGE), p => { state.page=p; render(); window.scrollTo(0,0); });
    }

    window.showProfile = (name) => {
      const t = TRAITS.find(x => x.trait === name); if (!t) return;
      history.pushState({}, '', `?profile=${encodeURIComponent(name)}`);
      document.getElementById('list-view').classList.add('hidden');
      document.getElementById('profile-view').classList.remove('hidden');
      document.getElementById('profile-name').textContent = t.trait;
      document.getElementById('profile-rarity').innerHTML = ARPGDEX.rarityBadge(t.rarity);
      document.getElementById('trait-img').src = t.image;
      document.getElementById('d-trait').textContent = t.trait;
      document.getElementById('d-type').textContent = t.type;
      document.getElementById('d-rarity').innerHTML = ARPGDEX.rarityBadge(t.rarity);
      document.getElementById('d-price').textContent = t.price ? `$${t.price}` : 'Free';
      document.getElementById('d-desc').textContent = t.description;
      if (window.innerWidth < 500) document.getElementById('trait-detail-grid').style.gridTemplateColumns = '1fr';
      window.scrollTo(0,0);
    };

    document.getElementById('back-btn').addEventListener('click', () => {
      history.pushState({}, '', 'traits.html');
      document.getElementById('profile-view').classList.add('hidden');
      document.getElementById('list-view').classList.remove('hidden');
    });
    window.addEventListener('popstate', () => {
      const p = ARPGDEX.getParam('profile');
      if (p) showProfile(p);
      else { document.getElementById('profile-view').classList.add('hidden'); document.getElementById('list-view').classList.remove('hidden'); }
    });

    document.querySelectorAll('[data-cat]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); state.cat = btn.dataset.cat; filter(); render();
      });
    });
    document.getElementById('filter-rarity').addEventListener('change', e => { state.rarity = e.target.value; filter(); render(); });
    document.getElementById('search-input').addEventListener('input', ARPGDEX.debounce(e => { state.search = e.target.value; filter(); render(); }));

    document.addEventListener('DOMContentLoaded', () => {
      const p = ARPGDEX.getParam('profile');
      filter();
      if (p) showProfile(p); else render();
    });
  </script>
</body>
</html>
