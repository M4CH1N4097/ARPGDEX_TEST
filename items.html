<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPGDEX — Item Catalogue</title>
  <meta name="robots" content="noai, noimageai">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="arpgdex.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <div data-include="includes/header.html"></div>

  <div id="main-container">

    <!-- List View -->
    <div id="list-view">
      <div class="page-header-card">
        <h2><a href="items.html" id="page-title">Item Catalogue</a></h2>

        <!-- ItemType 탭 (동적) -->
        <div style="margin-top:1rem;" class="cat-tabs" id="type-tabs"></div>

        <!-- 필터 바 -->
        <div style="margin-top:.85rem;" class="filter-bar">
          <select class="form-control" id="filter-rarity" style="max-width:160px;"></select>
          <input class="form-control" type="search" id="search-input" placeholder="검색…">
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;" class="fade-in" id="items-grid"></div>
      <div id="empty-state" class="empty-state hidden"><i class="fas fa-box-open"></i><p id="empty-text">아이템이 없습니다.</p></div>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- Profile View -->
    <div id="profile-view" class="hidden">
      <div style="margin-bottom:1rem;">
        <button class="btn btn-ghost btn-sm" id="back-btn"><i class="fas fa-arrow-left"></i> 목록으로</button>
      </div>
      <div class="card fade-in">
        <div class="card-header" style="padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;">
          <h2 id="profile-name" style="font-size:1.3rem;"></h2>
          <span id="profile-rarity"></span>
        </div>
        <div style="padding:1.5rem 2rem;">
          <div style="display:grid;grid-template-columns:180px 1fr;gap:2rem;align-items:start;" id="item-detail-grid">
            <img id="item-img" src="" alt="" style="width:100%;border-radius:var(--radius);background:var(--bg-faded);">
            <div>
              <table class="info-table">
                <tr><td id="lbl-item">아이템</td><td id="d-item"></td></tr>
                <tr><td id="lbl-type">유형</td><td id="d-type"></td></tr>
                <tr><td id="lbl-rarity">등급</td><td id="d-rarity"></td></tr>
                <tr><td id="lbl-getway">획득처</td><td id="d-getway"></td></tr>
                <tr id="row-price"><td id="lbl-price">구매</td><td id="d-price"></td></tr>
              </table>
              <hr id="desc-hr" style="display:none;">
              <div id="desc-area">
              <div style="font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.5rem;" id="lbl-desc">설명</div>
              <div id="d-desc" class="text-pre" style="font-size:.875rem;color:var(--text-secondary);line-height:1.7;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div data-include="includes/footer.html"></div>
  <script src="js/base.js" type="module"></script>
  <script type="module">
    import { ARPGDEX } from './js/utils.js';

    const PER_PAGE = 24;
    let ITEM_DATA = [];
    const OPT = { itemTypes:[], rarity:{}, rarityColor:{}, rarityBack:{} };
    let state = { filtered:[], type:'all', rarity:'all', search:'', page:1 };

    /* ---- Drive 이미지 URL 변환 ---- */
    const driveImg = url => {
      if (!url) return '';
      const m = url.match(/\/d\/([\w-]+)/);
      return m ? `https://drive.google.com/uc?id=${m[1]}&export=view` : url;
    };

    /* ---- 등급 뱃지 ---- */
    function rarityBadge(val) {
      const label = OPT.rarity[val] || val;
      const color = OPT.rarityColor[val];
      const bg    = OPT.rarityBack[val];
      if (color && bg) return `<span style="display:inline-block;padding:.2rem .6rem;border-radius:100px;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:${color};background:${bg};border:1px solid ${color}40;">${label}</span>`;
      return `<span class="badge">${label}</span>`;
    }

    /* ---- 옵션 로드 ---- */
    async function loadOptions() {
      const subOpt = await ARPGDEX.importSheet('SubOption');
      for (const row of subOpt) {
        // Rarity
        const rarVal = row['rarity'];
        const rarSid = Number(row['raritystringid'] || 0);
        if (rarVal && rarSid)                OPT.rarity[rarVal]      = ARPGDEX.S(rarSid) || rarVal;
        if (rarVal && row['raritycolor'])     OPT.rarityColor[rarVal] = row['raritycolor'];
        if (rarVal && row['raritybackcolor']) OPT.rarityBack[rarVal]  = row['raritybackcolor'];

        // ItemTypes
        const itVal = row['itemtypes'];
        const itSid = Number(row['itemtypesstringid'] || 0);
        if (itVal && itSid) OPT.itemTypes.push({ id: Number(row['id']), value: itVal, label: ARPGDEX.S(itSid) || itVal });
      }
      OPT.itemTypes.sort((a,b) => a.id - b.id);
    }

    /* ---- 데이터 로드 ---- */
    async function loadData() {
      await ARPGDEX.loadStrings();
      const [rawItems] = await Promise.all([
        ARPGDEX.importSheet('ItemList'),
        loadOptions(),
      ]);

      ITEM_DATA = rawItems
        .filter(r => !ARPGDEX.toBool(r['hide']) && Number(r['id']) !== 0 && r['id'] !== '')
        .map(r => ({
          id:          String(r['id'] || ''),
          name:        ARPGDEX.S(Number(r['itemname'] || 0)) || r['itemname'] || '',
          rarity:      String(r['rarity']    || ''),
          itemtype:    String(r['itemtypes'] || ''),
          image:       driveImg(r['image']   || ''),
          getway:      ARPGDEX.S(Number(r['getwayid'] || 0)) || '',
          description: ARPGDEX.S(Number(r['descriptionid'] || 0)) || '',
          itemId:      Number(r['itemid']    || 0),
          itemValue:   Number(r['itemvalue'] || 0),
        }));

      applyStrings();
      buildUI();

      const profileId = ARPGDEX.getParam('profile');
      filterData();
      if (profileId) showProfile(profileId);
      else renderGrid();
    }

    /* ---- 스트링 적용 ---- */
    function applyStrings() {
      const S = ARPGDEX.S;
      const title = document.getElementById('page-title');
      if (title && S(47)) title.innerHTML = S(47);
      const map = { 'lbl-item':57, 'lbl-type':11, 'lbl-rarity':9, 'lbl-getway':56, 'lbl-price':58, 'lbl-desc':55 };
      for (const [id, sid] of Object.entries(map)) {
        const el = document.getElementById(id);
        if (el && S(sid)) el.innerHTML = S(sid);
      }
      const emptyP = document.getElementById('empty-text');
      if (emptyP && S(38)) emptyP.innerHTML = S(38);
    }

    /* ---- UI 구성 ---- */
    function buildUI() {
      const S  = ARPGDEX.S;
      const all = S(36) || '전체';

      const usedTypes    = new Set(ITEM_DATA.map(t => t.itemtype));
      const usedRarities = new Set(ITEM_DATA.map(t => t.rarity));

      // ItemType 탭
      const typeTabs = document.getElementById('type-tabs');
      typeTabs.innerHTML = `<button class="cat-tab active" data-type="all">${all}</button>`;
      for (const it of OPT.itemTypes) {
        if (!usedTypes.has(it.value)) continue;
        const btn = document.createElement('button');
        btn.className = 'cat-tab';
        btn.dataset.type = it.value;
        btn.innerHTML = it.label;
        typeTabs.appendChild(btn);
      }
      typeTabs.querySelectorAll('[data-type]').forEach(btn => {
        btn.addEventListener('click', () => {
          typeTabs.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.type = btn.dataset.type;
          filterData(); renderGrid();
        });
      });

      // Rarity 셀렉트
      const rarSel = document.getElementById('filter-rarity');
      rarSel.innerHTML = `<option value="all">${S(9) || '등급'}: ${all}</option>`;
      for (const [val, label] of Object.entries(OPT.rarity)) {
        if (!usedRarities.has(val)) continue;
        rarSel.innerHTML += `<option value="${val}">${label}</option>`;
      }

      document.getElementById('search-input').placeholder = S(37) || '검색…';
    }

    /* ---- 필터 ---- */
    function filterData() {
      let arr = [...ITEM_DATA];
      if (state.type !== 'all')   arr = arr.filter(t => t.itemtype === state.type);
      if (state.rarity !== 'all') arr = arr.filter(t => t.rarity === state.rarity);
      if (state.search) {
        const q = state.search.toLowerCase();
        arr = arr.filter(t =>
          [t.name, t.rarity, t.itemtype, t.getway].join(' ').toLowerCase().includes(q)
        );
      }
      state.filtered = arr;
      state.page = 1;
    }

    /* ---- 그리드 렌더 ---- */
    function renderGrid() {
      const grid  = document.getElementById('items-grid');
      const empty = document.getElementById('empty-state');
      const { items } = ARPGDEX.paginate(state.filtered, state.page, PER_PAGE);
      if (!items.length) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      grid.innerHTML = items.map(t => `
        <div class="card" style="cursor:pointer;transition:border-color .2s,transform .2s;overflow:hidden;" onclick="showProfile('${t.id}')"
          onmouseover="this.style.borderColor='var(--border-strong)';this.style.transform='translateY(-2px)'"
          onmouseout="this.style.borderColor='';this.style.transform=''">
          <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-family:var(--font-heading);font-size:.85rem;">${t.name || '#' + t.id}</span>
            ${rarityBadge(t.rarity)}
          </div>
          <div style="padding:1rem;display:flex;align-items:center;gap:1rem;">
            ${t.image ? `<img src="${t.image}" alt="${t.name}" style="width:80px;height:80px;object-fit:cover;border-radius:var(--radius);flex-shrink:0;">` : ''}
            <div style="font-size:.82rem;color:var(--text-secondary);line-height:1.5;">${t.description}</div>
          </div>
        </div>`).join('');
      ARPGDEX.renderPagination(
        document.getElementById('pagination'), state.page,
        Math.ceil(state.filtered.length / PER_PAGE),
        p => { state.page = p; renderGrid(); window.scrollTo(0,0); }
      );
    }

    /* ---- 프로필 ---- */
    window.showProfile = (id) => {
      const t = ITEM_DATA.find(x => x.id === String(id));
      if (!t) return;
      history.pushState({}, '', `?profile=${encodeURIComponent(id)}`);
      document.getElementById('list-view').classList.add('hidden');
      document.getElementById('profile-view').classList.remove('hidden');

      document.getElementById('profile-name').innerHTML  = t.name || '#' + t.id;
      document.getElementById('profile-rarity').innerHTML = rarityBadge(t.rarity);
      const img = document.getElementById('item-img');
      img.src = t.image || '';
      img.style.display = t.image ? '' : 'none';

      document.getElementById('d-item').innerHTML   = t.name || '-';
      document.getElementById('d-type').innerHTML   = OPT.itemTypes.find(it => it.value === t.itemtype)?.label || t.itemtype || '-';
      document.getElementById('d-rarity').innerHTML = rarityBadge(t.rarity);
      document.getElementById('d-getway').innerHTML = t.getway || '-';

      // 구매 가격 (ItemId > 0일 때만 표기)
      const priceRow = document.getElementById('row-price');
      const priceEl  = document.getElementById('d-price');
      if (t.itemId > 0) {
        const currencyItem = ITEM_DATA.find(x => Number(x.id) === t.itemId);
        const icon = currencyItem?.image
          ? `<img src="${currencyItem.image}" style="width:18px;height:18px;object-fit:cover;border-radius:3px;margin-right:.3rem;flex-shrink:0;">`
          : '';
        const cname = currencyItem?.name || `#${t.itemId}`;
        priceEl.style.cssText = 'display:flex;align-items:center;';
        priceEl.innerHTML = `${icon}${cname} × ${t.itemValue.toLocaleString()}`;
        priceRow.style.display = '';
      } else {
        priceRow.style.display = 'none';
      }

      // hr은 가격 행이 있을 때만 표시, 없으면 설명 위 여백으로 대체
      const descHr = document.getElementById('desc-hr');
      const descArea = document.getElementById('desc-area');
      if (t.itemId > 0) {
        if (descHr) descHr.style.display = '';
        if (descArea) descArea.style.marginTop = '';
      } else {
        if (descHr) descHr.style.display = 'none';
        if (descArea) descArea.style.marginTop = '1.25rem';
      }

      document.getElementById('d-desc').innerHTML = t.description || '';

      if (window.innerWidth < 500) document.getElementById('item-detail-grid').style.gridTemplateColumns = '1fr';
      window.scrollTo(0,0);
    };

    /* ---- 이벤트 ---- */
    document.getElementById('back-btn').addEventListener('click', () => {
      history.pushState({}, '', 'items.html');
      document.getElementById('profile-view').classList.add('hidden');
      document.getElementById('list-view').classList.remove('hidden');
    });
    window.addEventListener('popstate', () => {
      const p = ARPGDEX.getParam('profile');
      if (p) showProfile(p);
      else { document.getElementById('profile-view').classList.add('hidden'); document.getElementById('list-view').classList.remove('hidden'); }
    });
    document.getElementById('filter-rarity').addEventListener('change', e => { state.rarity = e.target.value; filterData(); renderGrid(); });
    document.getElementById('search-input').addEventListener('input', ARPGDEX.debounce(e => { state.search = e.target.value; filterData(); renderGrid(); }));

    document.addEventListener('DOMContentLoaded', () => {
      loadData().catch(err => {
        console.error(err);
        document.getElementById('items-grid').innerHTML =
          `<div style="grid-column:1/-1;" class="empty-state"><i class="fas fa-triangle-exclamation"></i><p>${ARPGDEX.S(35) || '데이터를 불러오지 못했습니다.'}</p></div>`;
      });
    });
  </script>
</body>
</html>
