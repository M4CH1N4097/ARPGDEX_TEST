<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPGDEX — Staff</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="arpgdex.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <div data-include="includes/header.html"></div>
  <div id="main-container">
    <div class="page-header-card">
      <h2><a href="staff.html">Staff</a></h2>
      <div style="margin-top:1rem;" class="filter-bar">
        <input class="form-control" type="search" id="search-input" placeholder="검색…">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;" class="fade-in" id="staff-grid"></div>
    <div class="empty-state hidden" id="empty-state"><i class="fas fa-users"></i><p>운영진 정보가 없습니다.</p></div>
  </div>
  <div data-include="includes/footer.html"></div>
  <script src="js/base.js" type="module"></script>
  <script type="module">
    import { ARPGDEX } from './js/utils.js';

    const driveImg = url => {
      if (!url) return '';
      const m = url.match(/\/d\/([\w-]+)/);
      return m ? `https://drive.google.com/uc?id=${m[1]}&export=view` : url;
    };

    let STAFF = [];
    let filtered = [];

    async function loadData() {
      await ARPGDEX.loadStrings();
      const rows = await ARPGDEX.importSheet('Staff');

      STAFF = rows
        .filter(r => !ARPGDEX.toBool(r['hide']))
        .map(r => ({
          uid:         String(r['discorduserid'] || '').trim(),
          discordId:   String(r['discordid']     || '').trim(),
          username:    String(r['username']       || '').trim(),
          information: String(r['information']    || '').trim(),
          avatar:      driveImg(r['avatar']       || ''),
        }))
        .filter(r => r.username);

      filtered = [...STAFF];
      render();
    }

    function render() {
      const grid  = document.getElementById('staff-grid');
      const empty = document.getElementById('empty-state');
      if (!filtered.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      grid.innerHTML = filtered.map(s => `
        <div class="card" style="padding:1.25rem;">
          <div style="display:flex;gap:1rem;align-items:center;">
            ${s.avatar
              ? `<img src="${s.avatar}" alt="${s.username}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--border-strong);flex-shrink:0;">`
              : `<div style="width:72px;height:72px;border-radius:50%;background:var(--bg-raised);border:2px solid var(--border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fas fa-user" style="font-size:1.5rem;color:var(--text-muted);"></i></div>`
            }
            <div style="min-width:0;">
              <div style="font-family:var(--font-heading);font-size:1rem;font-weight:700;">${s.username}</div>
              ${s.discordId ? `<div style="font-size:.82rem;color:var(--text-secondary);margin-top:.15rem;">${s.discordId}</div>` : ''}
              ${s.uid ? `<div style="font-size:.72rem;color:var(--text-muted);margin-top:.1rem;font-family:monospace;">${s.uid}</div>` : ''}
            </div>
          </div>
          ${s.information ? `<hr><div style="font-size:.85rem;color:var(--text-secondary);line-height:1.6;">${s.information}</div>` : ''}
        </div>`).join('');
    }

    document.getElementById('search-input').addEventListener('input', ARPGDEX.debounce(e => {
      const q = e.target.value.toLowerCase();
      filtered = q
        ? STAFF.filter(s => (s.username + s.discordId + s.uid).toLowerCase().includes(q))
        : [...STAFF];
      render();
    }));

    document.addEventListener('DOMContentLoaded', () => {
      loadData().catch(err => console.error('[ARPGDEX] Staff 로드 실패:', err));
    });
  </script>
</body>
</html>
