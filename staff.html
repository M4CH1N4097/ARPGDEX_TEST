<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPGDEX — Staff</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="arpgdex.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <div data-include="includes/header.html"></div>
  <div id="main-container">
    <div class="page-header-card">
      <h2><a href="staff.html" id="page-title">Staff</a></h2>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;" class="fade-in" id="staff-grid"><div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);"><i class="fas fa-spinner fa-spin" style="font-size:1.5rem;margin-bottom:.75rem;display:block;"></i>데이터를 불러오는 중입니다…</div></div>
    <div class="empty-state hidden" id="empty-state"><i class="fas fa-users"></i><p>운영진 정보가 없습니다.</p></div>
  </div>
  <div data-include="includes/footer.html"></div>
  <script src="js/base.js" type="module"></script>
  <script type="module">
    import { ARPGDEX } from './js/utils.js';

    const driveImg = url => {
      if (!url) return '';
      const m = url.match(/\/d\/([\w-]+)/);
      return m ? `https://drive.google.com/uc?id=${m[1]}&export=view` : url;
    };

    let STAFF = [];
    let filtered = [];

    let ROLE_MAP = {};
    let USER_ROLE_MAP = {};  // { uid → roleId }

    function roleIconHTML(roleId) {
      if (!roleId) return '';
      const role = ROLE_MAP[String(roleId)];
      if (!role || !role.icon) return '';
      const color = role.iconColor || 'var(--text-primary)';
      const tip   = role.description ? ` class="arpg-tooltip" data-tip="${role.description}"` : '';
      return `<span${tip} style="display:inline-flex;align-items:center;margin-right:.35rem;"><i class="fas fa-${role.icon}" style="font-size:.85rem;color:${color};"></i></span>`;
    }

    async function loadData() {
      await ARPGDEX.loadStrings();

      const title = document.getElementById('page-title');
      if (title && ARPGDEX.S(52)) title.innerHTML = ARPGDEX.S(52);

      const [rows, rawRoles, rawUsers] = await Promise.all([
        ARPGDEX.importSheet('Staff'),
        ARPGDEX.importSheet('Role'),
        ARPGDEX.importSheet('UserInventory'),
      ]);

      // Role 맵
      for (const row of (rawRoles || [])) {
        const id = String(row['id'] || '').trim();
        if (!id) continue;
        const descSid = Number(row['descriptionid'] || 0);
        ROLE_MAP[id] = {
          icon:        String(row['icon']      || '').trim(),
          iconColor:   String(row['iconcolor'] || '').trim(),
          description: descSid ? ARPGDEX.S(descSid) : '',
        };
      }

      // UserInventory → uid: roleId 맵
      for (const row of (rawUsers || [])) {
        const uid    = String(row['discorduserid'] || '').trim();
        const roleId = String(row['role']          || '').trim();
        if (uid) USER_ROLE_MAP[uid] = roleId;
      }

      STAFF = rows
        .filter(r => !ARPGDEX.toBool(r['hide']))
        .map(r => {
          const uid = String(r['discorduserid'] || '').trim();
          return {
            uid,
            discordId:   String(r['discordid']  || '').trim(),
            username:    String(r['username']    || '').trim(),
            roleId:      USER_ROLE_MAP[uid]      || '',
            information: String(r['information'] || '').trim(),
            avatar:      driveImg(r['avatar']    || ''),
          };
        })
        .filter(r => r.username);

      filtered = [...STAFF];
      render();
    }

    function render() {
      const grid  = document.getElementById('staff-grid');
      const empty = document.getElementById('empty-state');
      if (!filtered.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      grid.innerHTML = filtered.map(s => `
        <div class="card" style="padding:1.25rem;">
          <div style="display:flex;gap:1rem;align-items:center;">
            ${s.avatar
              ? `<img src="${s.avatar}" alt="${s.username}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--border-strong);flex-shrink:0;">`
              : `<div style="width:72px;height:72px;border-radius:50%;background:var(--bg-raised);border:2px solid var(--border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fas fa-user" style="font-size:1.5rem;color:var(--text-muted);"></i></div>`
            }
            <div style="min-width:0;">
              <div style="font-family:var(--font-heading);font-size:1rem;font-weight:700;display:flex;align-items:center;">${roleIconHTML(s.roleId)}${s.username}</div>
              ${s.discordId ? `<div style="font-size:.82rem;color:var(--text-secondary);margin-top:.15rem;">${s.discordId}</div>` : ''}
              ${s.uid ? `<div style="font-size:.72rem;color:var(--text-muted);margin-top:.1rem;font-family:monospace;">${s.uid}</div>` : ''}
            </div>
          </div>
          ${s.information ? `<hr><div style="font-size:.85rem;color:var(--text-secondary);line-height:1.6;">${s.information}</div>` : ''}
        </div>`).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadData().catch(err => console.error('[ARPGDEX] Staff 로드 실패:', err));
    });
  </script>
</body>
</html>
