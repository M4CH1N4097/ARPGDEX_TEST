<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPGDEX — Staff</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="arpgdex.css">
</head>
<body>
  <div data-include="includes/header.html"></div>
  <div id="main-container">
    <div class="page-header-card">
      <h2><a href="staff.html">Staff</a></h2>
      <div style="margin-top:1rem;" class="filter-bar">
        <input class="form-control" type="search" id="search-input" placeholder="스태프 검색…">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;" class="fade-in" id="staff-grid"></div>
  </div>
  <div data-include="includes/footer.html"></div>
  <script src="js/base.js"></script>
  <script type="module">
    import { ARPGDEX } from './js/utils.js';
    const STAFF = [
      { username: 'AdminA', jobtitle: 'Owner', image: 'https://picsum.photos/seed/s1/200/200', information: '종족 오너입니다. 모든 관련 문의는 DM으로 주세요.' },
      { username: 'ModB', jobtitle: 'Moderator', image: 'https://picsum.photos/seed/s2/200/200', information: '디자인 승인 담당입니다.' },
      { username: 'ArtistC', jobtitle: 'Guest Artist', image: 'https://picsum.photos/seed/s3/200/200', information: '게스트 아티스트입니다.' },
    ];
    let filtered = STAFF;
    function render() {
      document.getElementById('staff-grid').innerHTML = filtered.map(s => `
        <div class="card" style="padding:1.25rem;">
          <div style="display:flex;gap:1rem;align-items:center;">
            <img src="${s.image}" alt="${s.username}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--border-strong);">
            <div>
              <div style="font-family:var(--font-heading);font-size:.95rem;">${s.username}</div>
              <div style="font-size:.75rem;color:var(--primary);font-weight:600;letter-spacing:.04em;">${s.jobtitle}</div>
            </div>
          </div>
          <hr>
          <div style="font-size:.85rem;color:var(--text-secondary);">${s.information}</div>
        </div>`).join('');
    }
    document.getElementById('search-input').addEventListener('input', ARPGDEX.debounce(e => {
      const q = e.target.value.toLowerCase();
      filtered = q ? STAFF.filter(s => s.username.toLowerCase().includes(q)) : STAFF;
      render();
    }));
    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
