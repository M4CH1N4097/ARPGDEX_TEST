<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPGDEX</title>
  <meta name="robots" content="noai, noimageai">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="arpgdex.css">
  <link rel="icon" href="data:,">
</head>
<body>

  <div data-include="includes/header.html"></div>

  <div id="main-container">

    <!-- Hero -->
    <div class="hero-banner fade-in" style="flex-direction:column;align-items:stretch;text-align:left;padding:0;min-height:unset;">

      <!-- Hero Title Row -->
      <div style="padding:2rem 2.5rem 1.5rem;text-align:center;">
        <div class="hero-title" id="site-name">ARPGDEX</div>
        <div class="hero-sub" id="site-sub" style="margin-top:.4rem;">창작 종족 ARPG 관리 시스템</div>
      </div>

      <!-- Hero Body: Image (left) + Description (right) -->
      <div class="hero-body" style="display:grid;grid-template-columns:1fr 1fr;min-height:280px;">

        <!-- Left: Representative Image -->
        <div style="display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem 2rem;order:1;">
          <img id="hero-image" src="https://picsum.photos/seed/hero/600/400"
               alt="대표 이미지"
               style="max-width:100%;max-height:280px;object-fit:cover;border-radius:var(--radius-lg);opacity:.9;">
        </div>

        <!-- Right: Description + Button -->
        <div style="padding:1.5rem 2.5rem 2rem 1rem;display:flex;flex-direction:column;justify-content:center;gap:1.25rem;order:2;">
          <div id="hero-desc" style="font-size:.95rem;color:var(--text-secondary);line-height:1.9;"></div>
          <div style="display:flex;gap:.6rem;flex-wrap:wrap;">
            <a id="discord-btn" href="" class="btn btn-primary" style="pointer-events:none;opacity:.5;"><i class="fab fa-discord"></i> 디스코드</a>
          </div>
        </div>

      </div>
    </div>

    <!-- Quick Links — generated from NAV_ITEMS in nav-config.js -->
    <div class="section-card fade-in" style="animation-delay:.05s">
      <div id="quick-links" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:.75rem;"></div>
    </div>

    <!-- Recent Designs + Recent Gallery (side by side) -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:stretch;" class="fade-in" id="dual-section">

      <div class="section-card" id="recent-designs-section">
        <div class="section-card-header">
          <h3><a href="masterlist.html">Recent Designs</a></h3>
          <a href="masterlist.html" class="btn btn-ghost btn-sm">View All <i class="fas fa-arrow-right"></i></a>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem;" id="recent-designs"></div>
      </div>

      <div class="section-card" id="recent-gallery-section">
        <div class="section-card-header">
          <h3><a href="gallery.html">Recent Gallery</a></h3>
          <a href="gallery.html" class="btn btn-ghost btn-sm">View All <i class="fas fa-arrow-right"></i></a>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem;" id="recent-gallery"></div>
      </div>

    </div>

  </div>

  <div data-include="includes/footer.html"></div>

  <script src="js/base.js" type="module"></script>
  <script type="module">
    import { ARPGDEX } from './js/utils.js';
    import { MENU_GROUPS, loadMenu, loadSiteConfig, SITE_CONFIG } from './js/base.js';

    const mockDesigns = [
      { design: 'CHA-001', image: 'https://picsum.photos/seed/c1/200/200', owner: 'Alice' },
      { design: 'CHA-002', image: 'https://picsum.photos/seed/c2/200/200', owner: 'Bob' },
      { design: 'CHA-003', image: 'https://picsum.photos/seed/c3/200/200', owner: 'Carol' },
      { design: 'CHA-004', image: 'https://picsum.photos/seed/c4/200/200', owner: 'Dave' },
    ];

    const mockGallery = [
      { id: 'G-001', title: '봄날의 소풍', author: 'Alice', category: '일반', thumb: 'https://picsum.photos/seed/g1/400/225' },
      { id: 'G-002', title: '프롬프트: 달빛 아래서', author: 'Bob', category: '프롬프트', thumb: 'https://picsum.photos/seed/g2/400/225' },
      { id: 'G-003', title: '모험의 시작', author: 'Carol', category: '일반', thumb: 'https://picsum.photos/seed/g3/400/225' },
    ];

    document.addEventListener('DOMContentLoaded', async () => {

      // base.js의 loadMenu가 이미 실행됐을 수 있으므로 채워진 경우 바로, 아니면 대기
      const renderQuickLinks = () => {
        const el = document.getElementById('quick-links');
        if (!el) return;
        el.innerHTML = MENU_GROUPS.map(group => `
          <div>
            <div style="font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.6rem;">
              ${group.label}
            </div>
            <ul class="link-list">
              ${group.items.map(item => {
                const target = item.external ? ' target="_blank" rel="noopener"' : '';
                return `<li><a href="${item.href}"${target}>${item.label}</a></li>`;
              }).join('')}
            </ul>
          </div>`).join('');
      };

      // MENU_GROUPS는 base.js DOMContentLoaded에서 채워지므로
      // 이 스크립트의 DOMContentLoaded와 경쟁할 수 있어 loadMenu 재호출로 보장
      await Promise.all([loadMenu(), loadSiteConfig()]);
      renderQuickLinks();

      // 사이트명 / 부제 / 히어로 이미지 적용
      if (SITE_CONFIG.name) {
        const nameEl = document.getElementById('site-name');
        if (nameEl) nameEl.textContent = SITE_CONFIG.name;
        document.title = SITE_CONFIG.name;
      }
      if (SITE_CONFIG.sub) {
        const subEl = document.getElementById('site-sub');
        if (subEl) subEl.textContent = SITE_CONFIG.sub;
      }
      if (SITE_CONFIG.discordLink) {
        const btn = document.getElementById('discord-btn');
        if (btn) {
          btn.href = SITE_CONFIG.discordLink;
          btn.target = '_blank';
          btn.rel = 'noopener';
          btn.style.pointerEvents = '';
          btn.style.opacity = '';
        }
      }
      if (SITE_CONFIG.heroImage) {
        const imgEl = document.getElementById('hero-image');
        if (imgEl) imgEl.src = SITE_CONFIG.heroImage;
      }

      // Hero description — main.html fetch
      fetch('main.html')
        .then(r => r.text())
        .then(html => { document.getElementById('hero-desc').innerHTML = html; })
        .catch(() => { document.getElementById('hero-desc').textContent = '소개 글을 불러오지 못했습니다.'; });

      // Designs
      const designGrid = document.getElementById('recent-designs');
      designGrid.innerHTML = mockDesigns.map(d => `
        <a class="gallery-card" href="masterlist.html?profile=${encodeURIComponent(d.design)}">
          <div class="gallery-card-img"><img src="${d.image}" alt="${d.design}" loading="lazy"></div>
          <div class="gallery-card-info">
            <div class="gallery-card-title">${d.design}</div>
            <div class="gallery-card-sub">${d.owner}</div>
          </div>
        </a>`).join('');

      // Gallery
      const galleryGrid = document.getElementById('recent-gallery');
      galleryGrid.innerHTML = mockGallery.map(g => `
        <a class="gallery-card" href="gallery.html?post=${encodeURIComponent(g.id)}">
          <div class="gallery-card-img"><img src="${g.thumb}" alt="${g.title}" loading="lazy"></div>
          <div class="gallery-card-info">
            <div class="gallery-card-title">${g.title}</div>
            <div class="gallery-card-sub"><i class="fas fa-user" style="font-size:.65rem;opacity:.6;margin-right:.2rem;"></i>${g.author}</div>
          </div>
        </a>`).join('');

    });
  </script>

</body>
</html>
