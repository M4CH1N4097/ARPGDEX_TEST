<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPGDEX — Prompt Catalogue</title>
  <meta name="robots" content="noai, noimageai">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="arpgdex.css">
</head>
<body>
  <div data-include="includes/header.html"></div>

  <div id="main-container">

    <div id="list-view">
      <div class="page-header-card">
        <h2><a href="prompts.html">Prompt Catalogue</a></h2>
        <div style="margin-top:1rem;" class="filter-bar">
          <input class="form-control" type="search" id="search-input" placeholder="프롬프트 제목 검색…">
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;" class="fade-in" id="prompts-grid"></div>
      <div id="empty-state" class="empty-state hidden"><i class="fas fa-scroll"></i><p>프롬프트가 없습니다.</p></div>
      <div class="pagination" id="pagination"></div>
    </div>

    <div id="profile-view" class="hidden">
      <div style="margin-bottom:1rem;">
        <button class="btn btn-ghost btn-sm" id="back-btn"><i class="fas fa-arrow-left"></i> 목록으로</button>
      </div>
      <div class="card fade-in">
        <div class="card-header" style="padding:1.5rem 2rem;">
          <h2 id="profile-name" style="font-size:1.3rem;"></h2>
        </div>
        <div id="profile-banner" style="min-height:200px;background:var(--bg-faded);background-size:cover;background-position:center;"></div>
        <div style="padding:1.5rem 2rem;">
          <div id="d-desc" class="text-pre" style="font-size:.9rem;color:var(--text-secondary);margin-bottom:1.5rem;"></div>
          <div style="display:flex;gap:2rem;font-size:.8rem;color:var(--text-muted);">
            <span><i class="far fa-calendar fa-fw"></i> 시작: <strong id="d-start"></strong></span>
            <span><i class="fas fa-flag-checkered fa-fw"></i> 마감: <strong id="d-end"></strong></span>
          </div>
        </div>
        <div class="card-footer text-right">
          <a id="d-link" href="#" class="btn btn-primary btn-sm">Check It Out <i class="fas fa-circle-chevron-right fa-fw"></i></a>
        </div>
      </div>
    </div>

  </div>

  <div data-include="includes/footer.html"></div>
  <script src="js/base.js"></script>
  <script type="module">
    import { ARPGDEX } from './js/utils.js';

    const PROMPTS = [
      { title: '달빛 산책', description: '달빛이 비치는 밤거리를 걷는 장면을 그려주세요.\n자신의 캐릭터를 사용해 달빛 아래의 분위기를 표현해 보세요.', startdate: '2024-10-01', enddate: '2024-12-31', link: '#', image: 'https://picsum.photos/seed/p1/800/300' },
      { title: '봄맞이 소풍', description: '봄날 꽃이 핀 들판에서의 소풍 장면을 그려주세요.\n캐릭터들과 함께하는 즐거운 봄날을 표현해 보세요.', startdate: '2024-03-01', enddate: '2024-05-31', link: '#', image: 'https://picsum.photos/seed/p2/800/300' },
      { title: '겨울 축제', description: '겨울 축제를 즐기는 장면을 그려주세요.\n눈이 내리는 마을 광장에서의 따뜻한 순간을 담아보세요.', startdate: '2024-12-01', enddate: '2025-01-31', link: '#', image: 'https://picsum.photos/seed/p3/800/300' },
    ];

    const PER_PAGE = 9;
    let state = { filtered: PROMPTS, search: '', page: 1 };

    function filter() {
      let arr = PROMPTS;
      if (state.search) { const q = state.search.toLowerCase(); arr = arr.filter(p => p.title.toLowerCase().includes(q)); }
      state.filtered = arr; state.page = 1;
    }

    function render() {
      const grid = document.getElementById('prompts-grid');
      const empty = document.getElementById('empty-state');
      const { items } = ARPGDEX.paginate(state.filtered, state.page, PER_PAGE);
      if (!items.length) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      grid.innerHTML = items.map(p => `
        <div class="card" style="cursor:pointer;transition:border-color .2s,transform .2s;overflow:hidden;" onclick="showProfile('${encodeURIComponent(p.title)}')"
          onmouseover="this.style.borderColor='var(--border-strong)';this.style.transform='translateY(-2px)'"
          onmouseout="this.style.borderColor='';this.style.transform=''">
          <div style="height:140px;background:url(${p.image}) center/cover no-repeat;"></div>
          <div class="card-header" style="font-family:var(--font-heading);font-size:.9rem;">${p.title}</div>
          <div style="padding:.75rem 1.25rem;font-size:.82rem;color:var(--text-secondary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${p.description}</div>
          <div class="card-footer" style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--text-muted);">
            <span>${p.startdate}</span><span>${p.enddate}</span>
          </div>
        </div>`).join('');
      ARPGDEX.renderPagination(document.getElementById('pagination'), state.page, Math.ceil(state.filtered.length/PER_PAGE), p => { state.page=p; render(); window.scrollTo(0,0); });
    }

    window.showProfile = (titleEnc) => {
      const title = decodeURIComponent(titleEnc);
      const p = PROMPTS.find(x => x.title === title); if (!p) return;
      history.pushState({}, '', `?profile=${titleEnc}`);
      document.getElementById('list-view').classList.add('hidden');
      document.getElementById('profile-view').classList.remove('hidden');
      document.getElementById('profile-name').textContent = p.title;
      document.getElementById('d-desc').textContent = p.description;
      document.getElementById('d-start').textContent = p.startdate;
      document.getElementById('d-end').textContent = p.enddate;
      document.getElementById('d-link').href = p.link;
      document.getElementById('profile-banner').style.backgroundImage = `url(${p.image})`;
      window.scrollTo(0,0);
    };

    document.getElementById('back-btn').addEventListener('click', () => {
      history.pushState({}, '', 'prompts.html');
      document.getElementById('profile-view').classList.add('hidden');
      document.getElementById('list-view').classList.remove('hidden');
    });
    window.addEventListener('popstate', () => {
      const p = ARPGDEX.getParam('profile');
      if (p) showProfile(p);
      else { document.getElementById('profile-view').classList.add('hidden'); document.getElementById('list-view').classList.remove('hidden'); }
    });
    document.getElementById('search-input').addEventListener('input', ARPGDEX.debounce(e => { state.search = e.target.value; filter(); render(); }));
    document.addEventListener('DOMContentLoaded', () => {
      const p = ARPGDEX.getParam('profile'); filter();
      if (p) showProfile(p); else render();
    });
  </script>
</body>
</html>
